<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>诗词接龙游戏</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container" class="hidden">
        <!-- Left control panel -->
        <div id="left-panel" class="panel">
            <div class="panel-header">
                <h1>诗词接龙</h1>
                <button class="collapse-btn" data-panel="export" title="折叠">折叠</button>
            </div>
            <div class="panel-content">
                <div class="status-label" id="status-label">点击已有字，选起点，接龙</div>
                <div class="stats">
                    <div>回合: <span id="turn-count">1</span></div>
                    <div>诗句: <span id="poem-count">1</span></div>
                </div>
                <button id="undo-btn" class="btn" style="margin-top:10px;width:100%;" disabled>撤销</button>
                <button id="redo-btn" class="btn" style="margin-top:6px;width:100%;" disabled>重做</button>
                <hr style="margin:12px 0;border:none;border-top:1px solid #eee;">
                <button id="export-btn" class="btn" style="width:100%;">导出存档</button>
                <button id="import-btn" class="btn" style="margin-top:6px;width:100%;">导入存档</button>
                <input type="file" id="import-file" accept=".json" style="display:none;">
            </div>
        </div>

        <!-- Poem list panel (right side) -->
        <div id="poem-list-panel" class="panel" style="top:20px;left:auto;right:20px;min-width:180px;max-width:220px;max-height:calc(100dvh - 40px);overflow-y:auto;">
            <div class="panel-header">
                <h2 style="font-size:15px;margin-bottom:10px;color:#333;font-weight:500;">已录诗句</h2>
                <button class="collapse-btn" data-panel="poemlist" title="折叠">折叠</button>
            </div>
            <div class="panel-content">
                <div id="poem-list"></div>
            </div>
        </div>

        <!-- Canvas container -->
        <div id="canvas-container">
            <canvas id="game-canvas"></canvas>
        </div>

        <!-- Bottom draft operation bar -->
        <div id="draft-bar" class="draft-bar hidden">
            <button id="cancel-btn" class="btn">取消</button>
            <span id="draft-hint" style="font-size:13px;color:#888;font-family:'Noto Serif SC',serif;">在格子中逐字输入，与已有字重合即可接龙</span>
            <button id="confirm-btn" class="btn primary" disabled>确认</button>
        </div>
    </div>

    <!-- 欢迎界面 - 标题 -->
    <div id="start-game-overlay" class="overlay">
        <div class="overlay-content">
            <h1 class="game-title">诗词接龙</h1>
            <p class="game-subtitle">在诗词的世界里穿行，连接文字的美好</p>
            <p class="click-hint">点击任意处继续</p>
        </div>
    </div>

    <!-- 输入起始诗句界面 -->
    <div id="input-origin-overlay" class="overlay hidden">
        <div class="overlay-content">
            <h2 style="font-weight: 300; letter-spacing: 2px;">从哪开始</h2>
            <p class="input-hint">输入一句诗词开始游戏</p>
            <div id="initInput">
                <input type="text" id="initial-poem-input" placeholder="春眠不觉晓" maxlength="20">
                <div id="init-error" class="error-message hidden"></div>
            </div>
            <div class="input-actions">
                <button id="back-btn" class="btn">返回</button>
                <button id="begin-game-btn" class="btn primary">开始</button>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
